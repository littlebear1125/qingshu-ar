<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎋 青树计划 · 结业典礼</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0d2b1a 0%, #1a4731 50%, #0d2b1a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: white; overflow: hidden; padding: 20px;
    }
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle { position: absolute; border-radius: 50%; opacity: 0; animation: float linear infinite; }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; } 90% { opacity: 0.5; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 24px; padding: 36px 32px;
      max-width: 340px; width: 100%; text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.8s ease forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-wrap {
      width: 110px; height: 110px; margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(201,168,76,0.4);
      display: flex; align-items: center; justify-content: center;
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.2); }
      50% { box-shadow: 0 0 25px 6px rgba(201,168,76,0.12); }
    }
    .logo-wrap img { width: 80px; height: 80px; object-fit: contain; }
    .divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 0 auto 16px; }
    h1 { font-size: 26px; color: #c9a84c; letter-spacing: 4px; margin-bottom: 4px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 2px; margin-bottom: 24px; }
    .hr { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.25), transparent); margin-bottom: 24px; }
    .poem { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .line { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.85); opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .line:nth-child(1) { animation-delay: 1s; }
    .line:nth-child(2) { animation-delay: 1.7s; }
    .line:nth-child(3) { animation-delay: 2.4s; color: #c9a84c; font-size: 16px; font-weight: 500; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .footer { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }
    .bamboo { font-size: 28px; margin-bottom: 14px; display: block; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
  </style>
</head>
